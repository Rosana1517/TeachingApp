name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允許手動觸發

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: /usr/bin/xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Archive (unsigned)
        run: |
          xcodebuild archive \
            -project TeachingApp.xcodeproj \
            -scheme TeachingApp \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath ./build/TeachingApp.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package unsigned IPA
        run: |
          mkdir -p ./build/output/Payload
          cp -R "./build/TeachingApp.xcarchive/Products/Applications/TeachingApp.app" ./build/output/Payload/
          cd ./build/output
          zip -r -y TeachingApp.ipa Payload

      - name: Upload IPA to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: ./build/output/TeachingApp.ipa
          tag_name: v${{ github.run_number }}
          name: Build #${{ github.run_number }}
          body: |
            Auto-built from commit ${{ github.sha }}
            Build time: ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
