name: Generate Daily French Lessons

on:
  # 改由 cron-job.org 透過 API 呼叫 workflow_dispatch 觸發，
  # 不再依賴 GitHub 自己的 schedule（時間不準、可能被跳過）。
  workflow_dispatch:

permissions:
  contents: write  # 允許寫入 Releases

jobs:
  generate-french-lesson:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TeachingApp/french

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate French lesson
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in directory:"
          ls -la
          echo "Running Python script..."
          python generate_french_lesson.py
          echo "Python script completed successfully"
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}

      - name: Commit and push if changed
        working-directory: .
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add TeachingApp/french/french-lesson-*.html
          git diff --cached --quiet || git commit -m "Add French lesson: $(date +%Y-%m-%d)"
          git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ${{ github.ref }}
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The generator writes exactly one new lesson file each run. Use the
          # highest lesson number rather than raw mtime so checkout timestamps
          # or runner clock quirks never pick the wrong file.
          LESSON_FILE=$(ls french-lesson-*.html | sort | tail -1)
          TAG_NAME=$(echo "$LESSON_FILE" | sed 's/french-lesson-\([0-9]*\)\.html/lesson-\1/')

          echo "Generating lesson file: $LESSON_FILE"
          echo "Tag name: $TAG_NAME"

          if gh release view "$TAG_NAME" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$LESSON_FILE" \
              --repo "${{ github.repository }}" \
              --clobber
          else
            gh release create "$TAG_NAME" "$LESSON_FILE" \
              --repo "${{ github.repository }}" \
              --title "Lesson $TAG_NAME" \
              --notes "Auto-generated French lesson"
          fi

          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/$TAG_NAME"
