name: Generate Vibe Coding Lessons

on:
  # 改由 cron-job.org 透過 API 呼叫 workflow_dispatch 觸發，
  # 不再依賴 GitHub 自己的 schedule（時間不準、可能被跳過）。
  workflow_dispatch:

permissions:
  contents: write  # 允許寫入 Releases

jobs:
  generate-vibe-lesson:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 新課程

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate Vibe Coding lesson
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in directory:"
          ls -la
          echo "Running Python script..."
          python generate_vibe_lesson.py
          echo "Python script completed successfully"
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add TeachingApp/vibe-lesson-*.html
          git diff --cached --quiet || git commit -m "Add Vibe Coding lesson: $(date +%Y-%m-%d)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        id: upload_release
        run: |
          LESSON_FILE=$(ls -t TeachingApp/vibe-lesson-*.html | head -1)
          TAG_NAME="vibe-lesson-$(echo $LESSON_FILE | sed 's/.*vibe-lesson-\([0-9]*\)\.html/\1/')"
          FILENAME=$(basename "$LESSON_FILE")

          echo "Uploading lesson file: $FILENAME"
          echo "Tag name: $TAG_NAME"

          # Delete existing asset if present (to replace with updated version)
          gh release delete-asset "$TAG_NAME" "$FILENAME" --repo "${{ github.repository }}" --yes 2>/dev/null || true

          # Create or update release with asset
          gh release create "$TAG_NAME" \
            --title "Vibe Coding Lesson $TAG_NAME" \
            --notes "Auto-generated Vibe Coding lesson" \
            --repo "${{ github.repository }}" \
            "$LESSON_FILE" || \
          gh release upload "$TAG_NAME" "$LESSON_FILE" --repo "${{ github.repository }}"

          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/$TAG_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
